  #header .subtitle { font-size: 11px; color: #64748b; margin-top: 1px; }
  #header-right { display: flex; align-items: center; gap: 16px; }

  .year-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 3px; }
  .year-tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: #64748b; border: none; background: transparent; }
  .year-tab:hover { color: #cbd5e1; }
  .year-tab.active { background: #334155; color: #f8fafc; }

  /* === KPI Bar === */
  #kpi-bar {
    position: fixed; top: 68px; left: 0; right: 0; z-index: 90;
    display: flex; justify-content: center; gap: 2px; padding: 0 24px;
    pointer-events: none;
  }
  .kpi-card {
    background: rgba(15,23,42,0.9); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 20px; text-align: center; min-width: 130px;
    pointer-events: auto; backdrop-filter: blur(8px);
  }
  .kpi-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: #f8fafc; line-height: 1.1; }
  .kpi-unit { font-size: 11px; color: #64748b; font-weight: 400; margin-left: 2px; }
  .kpi-card.fire .kpi-value { color: #fb923c; }
  .kpi-card.pct .kpi-value { color: #4ade80; }
  .kpi-card.demand .kpi-value { color: #60a5fa; }

  /* === Left Panel === */

    position: fixed; left: 16px; top: 135px; bottom: 70px; z-index: 80;
    width: 220px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  #left-panel::-webkit-scrollbar { width: 3px; }
  #left-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .panel-section {
    background: rgba(15,23,42,0.92); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(8px);
  }
  .panel-title { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-weight: 500; }
  .planting-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
  .planting-row:last-child { border-bottom: none; }
  .planting-row .region { color: #cbd5e1; font-weight: 500; }
  .planting-row .val { color: #94a3b8; }
  .planting-row .val strong { color: #e2e8f0; }
  .planting-row .val.area { color: #94a3b8; }

  /* === Right Panel === */

    position: fixed; right: 16px; top: 135px; bottom: 70px; z-index: 80;
    width: 230px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;

  .demand-table { width: 100%; font-size: 11px; }

  #map { width: 100%; height: 100%; }

  /* === Bottom filter === */

    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    display: flex; gap: 6px; padding: 6px 10px;
    background: rgba(15,23,42,0.9); border: 1px solid rgba(255,255,255,0.1);

  .filter-btn.auto.active { background: rgba(56,189,248,0.2); color: #38bdf8; }

const ORIGIN_COORDS = {
  '塔城': [82.98, 46.74], '昌吉': [87.3, 44.0], '伊犁': [81.32, 43.92],
  '阿勒泰': [88.13, 47.85], '奎屯': [84.9, 44.42], '博州': [82.07, 44.9],
};
const DEST_COORDS = {
  '四川': [104.06, 30.67], '重庆': [106.55, 29.57], '甘肃': [103.82, 36.06],
  '云南': [102.71, 25.04], '贵州': [106.71, 26.57], '青海': [101.78, 36.62], '宁夏': [106.28, 38.47],
};

const DEST_COLOR = '#3b82f6';
const FIRE_COLOR = '#f97316';
const AUTO_COLOR = '#38bdf8';

let currentFilter = 'all';
let mapChart = null;

// ===================== INIT =====================
async function init() {
  // Load ECharts
  await loadScript('https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js');

  // Load China map GeoJSON
  try {
    const resp = await fetch('china.json');
    const chinaJson = await resp.json();
    echarts.registerMap('china', chinaJson);
  } catch(e) {
    console.warn('china.json load failed, trying CDN:', e);
    try {
      const resp = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
      const chinaJson = await resp.json();
      echarts.registerMap('china', chinaJson);
    } catch(e2) {
      console.error('Map load failed:', e2);
      document.querySelector('.text').textContent = '地图加载失败，请检查网络';
      return;
    }
  }

  echartsLoaded = true;
  document.getElementById('loading').style.display = 'none';
  initMap();
  renderUI();
  setupEventListeners();
}

// ===================== LOAD SCRIPT =====================
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ===================== MAP =====================
function initMap() {
  mapChart = echarts.init(document.getElementById('map'), null, { renderer: 'canvas' });
  updateMap();

  window.addEventListener('resize', () => mapChart && mapChart.resize());
}

function getFlowData(filter) {
  const data = DATA.flow_agg;
  const fireData = {};
  const autoData = {};
  const allFlows = {};

  for (const [key, vol] of Object.entries(data)) {
    const [prod, dest] = key.split('→');
    if (!ORIGIN_COORDS[prod] || !DEST_COORDS[dest]) continue;
    allFlows[key] = vol;
    // 估算：火运占94%，汽运6%
    if (filter === 'fire' || filter === 'all') fireData[key] = vol * 0.94;
    if (filter === 'auto' || filter === 'all') autoData[key] = vol * 0.06;
  }

  return { fireData, autoData, allFlows };
}

function updateMap() {
  if (!mapChart || !echartsLoaded) return;

  const { fireData, autoData, allFlows } = getFlowData(currentFilter);

  // 流向线
  const fireLines = Object.entries(fireData).map(([key, vol]) => {
    const [prod, dest] = key.split('→');
    return { coords: [ORIGIN_COORDS[prod], DEST_COORDS[dest]], value: vol };
  });
  const autoLines = Object.entries(autoData).map(([key, vol]) => {
    const [prod, dest] = key.split('→');
    return { coords: [ORIGIN_COORDS[prod], DEST_COORDS[dest]], value: vol };
  });

  // 产区散点
  const originScatter = Object.entries(DATA.prod_total).map(([name, vol]) => ({
    name, value: [...ORIGIN_COORDS[name], vol]
  }));

  // 销区散点
  const destScatter = Object.entries(DATA.dest_total).map(([name, vol]) => ({
    name, value: [...DEST_COORDS[name], vol]
  }));

  const maxVol = Math.max(...Object.values(DATA.prod_total));

  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(15,23,42,0.97)',
      borderColor: 'rgba(255,255,255,0.15)',
      borderWidth: 1,
      borderRadius: 8,
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      padding: [10, 14],
      formatter(params) {
        if (params.seriesName === '产区') {
          return `<div style="font-weight:600;color:#f8fafc;margin-bottom:2px">${params.data.name}</div>
            <div style="color:#94a3b8">三年总流出：<span style="color:#f97316;font-weight:600">${DATA.prod_total[params.data.name]}</span> 万吨</div>`;
        }
        if (params.seriesName === '销区') {
          return `<div style="font-weight:600;color:#f8fafc;margin-bottom:2px">${params.data.name}</div>
            <div style="color:#94a3b8">三年总流入：<span style="color:#3b82f6;font-weight:600">${DATA.dest_total[params.data.name]}</span> 万吨</div>`;
        }
        if (params.seriesName === '火运流向') {
          const [prod, dest] = params.data.name.split('→');
          return `<div style="font-weight:600;color:#f97316;margin-bottom:3px">🔥 ${prod} → ${dest}</div>
            <div style="color:#94a3b8">火运约 <span style="color:#f97316;font-weight:600">${(params.data.value * 0.94).toFixed(1)}</span> 万吨</div>
            <div style="color:#64748b;font-size:10px">占流向总量 <span style="color:#94a3b8">${((params.data.value / DATA.flow_agg[params.data.name]) * 94).toFixed(0)}%</span></div>`;
        }
        return '';
      }
    },
    geo: {
      map: 'china',
      roam: true,
      zoom: 1.1,
      center: [100, 38],
      itemStyle: {
        areaColor: '#0f172a',
        borderColor: 'rgba(59,130,246,0.15)',
        borderWidth: 1,
      },
      emphasis: {
        itemStyle: { areaColor: '#1e293b' },
        label: { show: false }
      },
      select: { disabled: true },
      silent: true,
    },
    series: [
      // 火运流向
      {
        name: '火运流向', type: 'lines', coordinateSystem: 'geo',
        zlevel: 2, symbol: ['none', 'arrow'],
        symbolSize: 8,
        effect: { show: true, period: 4, trailLength: 0.3, symbol: 'circle', symbolSize: 5, color: FIRE_COLOR },
        lineStyle: { color: FIRE_COLOR, width: 1.5, opacity: 0.6, curveness: 0.15 },
        data: fireLines.map(d => ({ ...d, name: `${d.coords[0][0] === 82.98 ? '塔城' : d.coords[0][0] === 87.3 ? '昌吉' : d.coords[0][0] === 81.32 ? '伊犁' : d.coords[0][0] === 88.13 ? '阿勒泰' : d.coords[0][0] === 84.9 ? '奎屯' : '博州'}→${Object.entries(DEST_COORDS).find(([,v])=>v[0]===d.coords[1][0]&&v[1]===d.coords[1][1])?.[0] || '销区'}`, value: d.value })),
      },
      // 汽运流向
      {
        name: '汽运流向', type: 'lines', coordinateSystem: 'geo',
        zlevel: 1, symbol: ['none', 'none'],
        effect: { show: false },
        lineStyle: { color: AUTO_COLOR, width: 1, opacity: 0.3, type: 'dashed', curveness: 0.15 },
        data: autoLines,
      },
      // 产区散点
      {
        name: '产区', type: 'effectScatter', coordinateSystem: 'geo',
        zlevel: 3, rippleEffect: { brushType: 'stroke', scale: 3 },
        symbolSize(val, params) { return 14 + (params.data.value[2] / maxVol) * 20; },
        itemStyle: { color: ORIGIN_COLOR, shadowBlur: 10, shadowColor: 'rgba(249,115,22,0.5)' },
        data: originScatter,
        label: {
          show: true, position: 'right', formatter: '{b}',
          fontSize: 11, color: '#fcd34d', fontWeight: 600,
          backgroundColor: 'rgba(3,7,18,0.7)', borderRadius: 3, padding: [2, 5],
        },
      },
      // 销区散点
      {
        name: '销区', type: 'effectScatter', coordinateSystem: 'geo',
        zlevel: 3, rippleEffect: { brushType: 'stroke', scale: 3 },
        symbolSize(val, params) { return 12 + (params.data.value[2] / Math.max(...Object.values(DATA.dest_total))) * 22; },
        itemStyle: { color: DEST_COLOR, shadowBlur: 10, shadowColor: 'rgba(59,130,246,0.4)' },
        data: destScatter,
        label: {
          show: true, position: 'right', formatter: '{b}',
          fontSize: 11, color: '#93c5fd', fontWeight: 500,
          backgroundColor: 'rgba(3,7,18,0.7)', borderRadius: 3, padding: [2, 5],
        },
      },
    ],
  };

  // 重新构建流向线的name
  const flowKeyMap = Object.keys(DATA.flow_agg);
  option.series[0].data = fireLines.map((d, i) => {
    const prod = Object.entries(ORIGIN_COORDS).find(([,v])=>Math.abs(v[0]-d.coords[0][0])<0.5&&Math.abs(v[1]-d.coords[0][1])<0.5)?.[0] || '产区';
    const dest = Object.entries(DEST_COORDS).find(([,v])=>Math.abs(v[0]-d.coords[1][0])<0.5&&Math.abs(v[1]-d.coords[1][1])<0.5)?.[0] || '销区';
    const key = `${prod}→${dest}`;
    return { ...d, name: key, value: DATA.flow_agg[key] || d.value };
  });

  mapChart.setOption(option, true);
}

// ===================== KPI =====================
function renderKPI() {
  const kpi = DATA.kpi[String(currentYear)];
  const bar = document.getElementById('kpi-bar');
  bar.innerHTML = `
    <div class="kpi-card"><div class="kpi-label">全年外运总量</div><div class="kpi-value">${kpi.total_vol}<span class="kpi-unit">万吨</span></div></div>
    <div class="kpi-card fire"><div class="kpi-label">铁路发运量</div><div class="kpi-value">${kpi.fire_vol}<span class="kpi-unit">万吨</span></div></div>
    <div class="kpi-card pct"><div class="kpi-label">铁路占比</div><div class="kpi-value">${kpi.fire_pct}<span class="kpi-unit">%</span></div></div>
    <div class="kpi-card demand"><div class="kpi-label">销区需求</div><div class="kpi-value">${kpi.total_demand}<span class="kpi-unit">万吨</span></div></div>
  `;
}

// ===================== LEFT PANEL =====================
function renderLeftPanel() {
  // 种植调研
  const planting = DATA.planting;
  const plantingList = document.getElementById('planting-list');
  const sorted = Object.entries(planting).sort((a, b) => b[1].output - a[1].output);
  plantingList.innerHTML = sorted.map(([region, d]) => `
    <div class="planting-row">
      <span class="region">${region}</span>
      <span class="val">
        <strong>${d.output.toFixed(0)}</strong>万吨
        <span class="area"> / ${(d.area/10000).toFixed(0)}万亩</span>
      </span>
    </div>
  `).join('');

  // 成本小记
  const avgCosts = sorted.map(([r, d]) => `${r}均${d.avg_cost}元/亩`);
}

// ===================== RIGHT PANEL =====================
function renderRightPanel() {
  // 销区需求
  const demand2025 = DATA.demand.filter(d => d.year === 2025);
  const demandList = document.getElementById('demand-list');
  demandList.innerHTML = `<table class="demand-table">
    <thead><tr><th>销区</th><th style="text-align:right">万吨</th><th style="text-align:right">到岸价</th></tr></thead>
    <tbody>
      ${demand2025.map(d => `
        <tr>
          <td class="region-tag">${d.region}</td>
          <td class="num">${d.demand}</td>
          <td class="num">${d.cif}</td>
        </tr>
      `).join('')}
    </tbody>
  </table>`;

  // 产区/销区汇总
  const prodList = document.getElementById('prod-total-list');
  const sortedProd = Object.entries(DATA.prod_total).sort((a,b)=>b[1]-a[1]);
  prodList.innerHTML = sortedProd.map(([r, v]) => `
    <div class="planting-row">
      <span class="region">${r}</span>
      <span class="val" style="color:#f97316"><strong>${v}</strong> 万吨</span>
    </div>
  `).join('');

  const destList = document.getElementById('dest-total-list');
  const sortedDest = Object.entries(DATA.dest_total).sort((a,b)=>b[1]-a[1]);
  destList.innerHTML = sortedDest.map(([r, v]) => `
    <div class="planting-row">
      <span class="region">${r}</span>
      <span class="val" style="color:#3b82f6"><strong>${v}</strong> 万吨</span>
    </div>
  `).join('');
}

// ===================== CHARTS =====================
function renderCharts() {
  renderMonthlyChart();
  renderFreightChart();
  renderPriceChart();
}

function renderMonthlyChart() {
  const el = document.getElementById('monthly-chart');
  if (!el) return;
  const chart = echarts.getInstanceByDom(el) || echarts.init(el);
  const mData = DATA.monthly[String(currentYear)] || [];
  const months = mData.map(d => `${d.month}月`);
  const fireData = mData.map(d => d.fire);
  const autoData = mData.map(d => d.auto);

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 8, bottom: 20, left: 32, right: 8 },
    xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisLabel: { color: '#475569', fontSize: 9 }, splitLine: { show: false }, axisTick: { show: false } },
    yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: '#475569', fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisTick: { show: false } },
    series: [
      { name: '火运', type: 'bar', stack: 't', data: fireData, itemStyle: { color: FIRE_COLOR, borderRadius: [0,0,0,0] }, barWidth: '55%' },
      { name: '汽运', type: 'bar', stack: 't', data: autoData, itemStyle: { color: AUTO_COLOR, borderRadius: [2,2,0,0] } },
    ],
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.97)', borderColor: 'rgba(255,255,255,0.15)', textStyle: { color: '#e2e8f0', fontSize: 11 }, axisPointer: { type: 'shadow' } },
  });
}

function renderFreightChart() {
  const el = document.getElementById('freight-chart');
  if (!el) return;
  const chart = echarts.getInstanceByDom(el) || echarts.init(el);
  const yearData = DATA.prices[String(currentYear)] || {};
  const months = Array.from({length:12}, (_,i) => `${i+1}月`);
  const priceData = months.map((m, i) => {
    const key = i+1;
    return yearData[key] ? yearData[key]['四川'] : null;
  });

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 8, bottom: 20, left: 40, right: 8 },
    xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisLabel: { color: '#475569', fontSize: 9 }, splitLine: { show: false }, axisTick: { show: false } },
    yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: '#475569', fontSize: 9, formatter: v => v.toFixed(0) }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisTick: { show: false } },
    series: [{ type: 'line', data: priceData, smooth: true, symbol: 'circle', symbolSize: 4, lineStyle: { color: '#fcd34d', width: 2 }, itemStyle: { color: '#fcd34d' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(252,211,77,0.25)' }, { offset: 1, color: 'rgba(252,211,77,0)' }] } } }],
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.97)', borderColor: 'rgba(255,255,255,0.15)', textStyle: { color: '#e2e8f0', fontSize: 11 }, formatter: params => params[0].axisValue + '<br/>四川: <b>' + params[0].value + '</b> 元/吨' },
  });
}

function renderPriceChart() {
  const el = document.getElementById('price-chart');
  if (!el) return;
  const chart = echarts.getInstanceByDom(el) || echarts.init(el);
  const yearData = DATA.prices[String(currentYear)] || {};
  const months = Array.from({length:12},(_,i) => `${i+1}月`);
  const regions = ['四川', '云南', '重庆', '贵州'];
  const colors = ['#f97316', '#a855f7', '#3b82f6', '#22c55e'];

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 8, bottom: 20, left: 38, right: 8 },
    legend: { show: false },
    xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisLabel: { color: '#475569', fontSize: 9 }, splitLine: { show: false }, axisTick: { show: false } },
    yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: '#475569', fontSize: 9, formatter: v => v.toFixed(0) }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisTick: { show: false } },
    series: regions.map((region, i) => ({
      name: region, type: 'line', data: months.map((_, idx) => yearData[idx+1] ? yearData[idx+1][region] : null),
      smooth: true, symbol: 'none', lineStyle: { color: colors[i], width: 1.5, opacity: 0.8 },
    })),
    tooltip: {
      trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.97)', borderColor: 'rgba(255,255,255,0.15)', textStyle: { color: '#e2e8f0', fontSize: 11 },
      formatter(params) {
        let s = `<b>${params[0].axisValue}</b><br/>`;
        params.forEach(p => { if(p.value != null) s += `<span style="color:${p.color}">●</span> ${p.seriesName}: <b>${p.value}</b><br/>`; });
        return s;
      }
    },
  });
}

// ===================== EVENT LISTENERS =====================
function setupEventListeners() {
  // Year tabs
  document.querySelectorAll('.year-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.year-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentYear = parseInt(btn.dataset.year);
      renderKPI();
      renderLeftPanel();
      renderCharts();
    });
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      updateMap();
    });
  });
}

// ===================== RENDER ALL =====================
function renderUI() {
  renderKPI();
  renderLeftPanel();
  renderRightPanel();
  renderCharts();
}

// ===================== START =====================
init();
</script>
</body>
</html>
